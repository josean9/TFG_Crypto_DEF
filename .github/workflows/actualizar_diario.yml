name: Actualizar CSV diario

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC todos los días
  workflow_dispatch:       # también ejecutable a mano

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Instalar dependencias
        run: pip install -r requirements-datos.txt
      
      - name: Ejecutar actualización
        run: python scripts/actualizar_diario.py
      
      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/csv/df_merged.csv data/csv/backups/
          git diff --staged --quiet || git commit -m "Actualización CSV automática $(date +%Y-%m-%d)"
          git push